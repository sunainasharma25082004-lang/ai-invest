# Alternative: admin panel at https://example.com/admin
# Use this INSTEAD of the admin.example.com server block in ai-invest.conf
# Build admin with: VITE_BASE_PATH=/admin/ npm run build --prefix admin

# Add these location blocks inside the main example.com HTTPS server { } block:

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/ai-invest/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location ~* ^/admin/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        alias /var/www/ai-invest/admin/dist/;
        expires 7d;
        add_header Cache-Control "public";
    }