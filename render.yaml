services:
  - type: web
    name: ai-invest
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm install --prefix server
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false